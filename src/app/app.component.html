<div class="container" *ngIf="personaje">
  <div class="card">

    <div class="image-section">
      <img [src]="personaje.image" [alt]="personaje.name">
      <span 
        class="status"
        [ngClass]="{
          'alive': personaje.status === 'Alive',
          'dead': personaje.status === 'Dead',
          'unknown': personaje.status === 'unknown'
        }"
      >
        {{ personaje.status }}
      </span>
    </div>

    <div class="info-section">
      <h1>{{ personaje.name }}</h1>

      <div class="info-grid">
        <div class="info-item">
          <span class="label">Species</span>
          <span class="value">{{ personaje.species }}</span>
        </div>

        <div class="info-item">
          <span class="label">Gender</span>
          <span class="value">{{ personaje.gender }}</span>
        </div>

        <div class="info-item">
          <span class="label">Origin</span>
          <span class="value">{{ personaje.origin.name }}</span>
        </div>

        <div class="info-item">
          <span class="label">Location</span>
          <span class="value">{{ personaje.location.name }}</span>
        </div>
      </div>

      <div class="created">
        Created: {{ personaje.created | date:'medium' }}
      </div>

    </div>

  </div>
</div>
